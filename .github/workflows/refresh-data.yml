name: Refresh Zoho CRM Data

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:
    inputs:
      report:
        description: 'Which report to refresh'
        required: false
        default: 'all'
        type: choice
        options: [all, clients, cases, cases-perf, distributions]

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch client report data
        if: ${{ github.event.inputs.report == 'all' || github.event.inputs.report == 'clients' || github.event_name == 'schedule' }}
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNTS_URL:  ${{ secrets.ZOHO_ACCOUNTS_URL }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_clients_data.py

      - name: Fetch cases report data
        if: ${{ github.event.inputs.report == 'all' || github.event.inputs.report == 'cases' || github.event_name == 'schedule' }}
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNTS_URL:  ${{ secrets.ZOHO_ACCOUNTS_URL }}
        run: python scripts/fetch_cases_data.py

      - name: Fetch cases performance data
        if: ${{ github.event.inputs.report == 'all' || github.event.inputs.report == 'cases-perf' || github.event_name == 'schedule' }}
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNTS_URL:  ${{ secrets.ZOHO_ACCOUNTS_URL }}
        run: python scripts/fetch_cases_perf_data.py

      - name: Fetch distributions data
        if: ${{ github.event.inputs.report == 'all' || github.event.inputs.report == 'distributions' || github.event_name == 'schedule' }}
        env:
          ZOHO_CLIENT_ID:     ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          ZOHO_ACCOUNTS_URL:  ${{ secrets.ZOHO_ACCOUNTS_URL }}
        run: python scripts/fetch_distributions_data.py

      - name: Write meta.json
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone
          data_dir = "data"
          datasets = []
          for fname, label in [("clients.json","Client Report"),("cases.json","Cases Report"),("cases_perf.json","Cases Performance"),("distributions.json","Distributions")]:
              path = os.path.join(data_dir, fname)
              if os.path.exists(path):
                  with open(path) as f: d = json.load(f)
                  datasets.append({
                      "name": label, "file": fname,
                      "record_count": d.get("meta",{}).get("record_count", 0),
                      "last_updated": d.get("meta",{}).get("last_updated",""),
                  })
          with open(os.path.join(data_dir,"meta.json"),"w") as f:
              json.dump({"last_updated": datetime.now(timezone.utc).isoformat(), "datasets": datasets}, f, indent=2)
          print(f"meta.json written with {len(datasets)} datasets")
          PYEOF

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --staged --quiet || git commit -m "chore: refresh CRM data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
