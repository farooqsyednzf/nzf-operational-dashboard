name: 🔑 Setup — Generate Refresh Token

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: 'Paste your code from Zoho API Console (scope: ZohoAnalytics.fullaccess.all)'
        required: true
        type: string

jobs:
  generate-token:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange code for refresh token
        run: |
          echo "🔄 Exchanging authorisation code for refresh token..."

          RESPONSE=$(curl -s -X POST "https://accounts.zoho.com/oauth/v2/token" \
            -d "code=${{ github.event.inputs.auth_code }}" \
            -d "client_id=${{ secrets.ZOHO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.ZOHO_CLIENT_SECRET }}" \
            -d "redirect_uri=https://www.zoho.com/crm" \
            -d "grant_type=authorization_code")

          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "❌ ERROR — Token exchange failed."
            echo "   Response: $RESPONSE"
            echo "   The code may have expired (10 min limit). Generate a new one and try again."
            exit 1
          fi

          REFRESH_TOKEN=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data.get('refresh_token','NOT_FOUND'))
          ")

          if [ "$REFRESH_TOKEN" = "NOT_FOUND" ]; then
            echo "❌ No refresh_token in response: $RESPONSE"
            exit 1
          fi

          echo ""
          echo "✅ Success!"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  REFRESH TOKEN:"
          echo ""
          echo "  $REFRESH_TOKEN"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "👉 Copy the token above and save it as the ZOHO_REFRESH_TOKEN"
          echo "   GitHub secret (Settings → Secrets → Actions → pencil icon)."
