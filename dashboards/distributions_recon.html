<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Distribution Reconciliation — NZF Dashboards</title>
  <link rel="stylesheet" href="/assets/css/dashboard.css"/>
  <style>
    /* ── Control bar ───────────────────────────────────────────── */
    .recon-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ctrl-label {
      font-family: 'Cambay', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
    }
    .ctrl-picker {
      display: flex;
      gap: 0;
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
    }
    .ctrl-picker button {
      padding: 5px 13px;
      font-family: 'Cambay', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-right: 1px solid var(--border-subtle);
      transition: background .1s, color .1s;
      white-space: nowrap;
    }
    .ctrl-picker button:last-child { border-right: none; }
    .ctrl-picker button:hover { background: var(--surface-2); color: var(--text-primary); }
    .ctrl-picker button.active { background: #1F3864; color: #fff; }
    .ctrl-picker button.active.red { background: var(--color-primary); }

    /* ── Zone headers ──────────────────────────────────────────── */
    .zone-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 0 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border-subtle);
    }
    .zone-header h2 {
      font-family: 'Bree Serif', serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-primary);
      margin: 0;
    }
    .zone-header .zone-sub {
      font-family: 'Cambay', sans-serif;
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .zone { margin-bottom: 32px; }

    /* ── KPI rows ──────────────────────────────────────────────── */

    .ytd-kpi {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
    }
    .ytd-kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--kpi-accent, var(--color-blue));
    }
    .ytd-kpi-label {
      font-family: 'Cambay', sans-serif;
      font-size: 0.66rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .ytd-kpi-value {
      font-family: 'Bree Serif', serif;
      font-size: 1.75rem;
      font-weight: 400;
      line-height: 1;
      color: var(--text-primary);
    }
    .ytd-kpi-sub {
      font-family: 'Cambay', sans-serif;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .ytd-kpi.accent-red   { --kpi-accent: var(--color-primary); }
    .ytd-kpi.accent-green { --kpi-accent: #49A942; }
    .ytd-kpi.accent-amber { --kpi-accent: #FDB913; }
    .ytd-kpi.accent-purple{ --kpi-accent: #7B3FA0; }
    .ytd-kpi.accent-navy  { --kpi-accent: #1F3864; }



    /* Month tabs + month-panel are styled by shared dashboard.css */

    /* .month-panel styled by shared dashboard.css */
    .month-panel-inner {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    /* ── Transfer type summary row ─────────────────────────────── */
    .tt-summary {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr 1.5fr 2fr;
      gap: 0;
      font-family: 'Cambay', sans-serif;
      font-size: 0.78rem;
    }
    .tt-summary-head {
      background: var(--surface-2);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-muted);
      padding: 6px 10px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .tt-summary-cell {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
    }

    /* ── Status / reconciliation badges ───────────────────────── */
    .s-paid    { background:rgba(73,169,66,0.1);  color:#2d7a27; border:1px solid rgba(73,169,66,0.3); }
    .s-overdue { background:rgba(238,53,38,0.08); color:#c0392b; border:1px solid rgba(238,53,38,0.3); }
    .s-urgent  { background:rgba(253,185,19,0.12);color:#7a5c00; border:1px solid rgba(253,185,19,0.4); }
    .s-pending { background:rgba(0,129,198,0.08); color:#005a8e; border:1px solid rgba(0,129,198,0.25);}
    .s-nobill  { background:rgba(123,63,160,0.1); color:#7B3FA0; border:1px solid rgba(123,63,160,0.3);}
    .h-ok      { color:#2d7a27; font-weight:700; }
    .h-warn    { color:#7a5c00; font-weight:700; }
    .h-danger  { color:#c0392b; font-weight:700; }
    .h-na      { color:var(--text-muted); }
    .xero-paid    { color:#2d7a27; font-size:.78rem; }
    .xero-pending { color:var(--text-muted); font-size:.78rem; font-style:italic; }
    .xero-missing { color:#7B3FA0; font-size:.78rem; font-style:italic; }

    /* ── Overdue row highlight ─────────────────────────────────── */
    tr.row-overdue { border-left: 3px solid var(--color-primary); }

    /* ── Live section filter bar ───────────────────────────────── */
    
    .recon-tab {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-muted);
      font-family: 'Cambay', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .12s;
      white-space: nowrap;
    }
    .recon-tab:hover { border-color: var(--color-blue); color: var(--color-blue); }
    .recon-tab.active { background:#1F3864; color:#fff; border-color:#1F3864; }
    .recon-tab.t-overdue.active { background:var(--color-primary); border-color:var(--color-primary); }
    .recon-tab.t-urgent.active  { background:#FDB913; color:#3a2e00; border-color:#FDB913; }
    .recon-tab.t-paid.active    { background:#49A942; border-color:#49A942; }
    .recon-tab.t-nobill.active  { background:#7B3FA0; border-color:#7B3FA0; }
    
    .live-search:focus { border-color: var(--color-blue); }

    /* ── Info banner ───────────────────────────────────────────── */
    .info-banner {
      background: rgba(0,129,198,.05);
      border: 1px solid rgba(0,129,198,.2);
      border-radius: var(--radius-lg);
      padding: 9px 14px;
      font-family: 'Cambay', sans-serif;
      font-size: .78rem;
      color: #005a8e;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
<div class="layout">
  <div id="sidebar-mount"></div>
  <div class="main">
    <div id="topbar-mount"></div>
    <div class="draft-disclaimer">All dashboards are in draft stage. For questions contact <a href="mailto:farooq.syed@nzf.org.au">Farooq</a>.</div>
    <div class="page-content">

      <!-- Page header -->
      <div class="page-header">
        <div class="page-header-left">
          <h1>Distribution Reconciliation</h1>
          <p>CRM distributions cross-referenced against Xero payments</p>
        </div>
        <div id="sync-label" style="text-align:right"></div>
      </div>

      <!-- Controls -->
      <div class="recon-controls">
        <div class="ctrl-group">
          <div class="ctrl-label">Distribution Type</div>
          <div class="ctrl-picker" id="type-picker"><!-- populated by JS --></div>
        </div>
      </div>



      <!-- ════════════════════════════════════════════════════
           ZONE 2 — MONTHLY RECONCILIATION
      ═════════════════════════════════════════════════════ -->
      <div class="zone">
        <div class="zone-header">
          <h2>Monthly Reconciliation</h2>
          <span class="zone-sub">CRM vs Xero — last 12 months</span>
        </div>

        <div class="month-tabs" id="month-tabs"><!-- populated by JS --></div>
        <div class="month-panel">
          <div class="month-panel-inner" id="month-panel-inner">
            <div style="padding:40px;text-align:center;font-family:'Cambay';color:var(--text-muted)">
              <div class="spinner" style="margin:0 auto 12px"></div>Loading monthly data…
            </div>
          </div>
        </div>
      </div>


    </div><!-- /page-content -->

  </div>
</div>

<script src="/assets/js/table-filter.js"></script>
<script src="/assets/js/auth.js"></script>
<script src="/assets/js/nav.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────
let _monthData  = null;
let _selType    = 'All';
let _selMonth   = null;

// ── Helpers ───────────────────────────────────────────────────────
const fmtAUD = n => '$' + Math.round(n||0).toLocaleString('en-AU');
const fmtDate = s => {
  if (!s) return '—';
  const d = new Date(s); if (isNaN(d)) return s;
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
};
const monthLabel = ym => {
  if (!ym) return '';
  const [y,m] = ym.split('-');
  return new Date(y,m-1,1).toLocaleString('en-AU',{month:'short',year:'2-digit'});
};
const monthFull = ym => {
  if (!ym) return '';
  const [y,m] = ym.split('-');
  return new Date(y,m-1,1).toLocaleString('en-AU',{month:'long',year:'numeric'});
};

// ── Financial year helpers ────────────────────────────────────────
// ── Bootstrap ─────────────────────────────────────────────────────
(async () => {
  await requireAuth();
  renderNav('Distribution Reconciliation');

  // Load both JSON files concurrently, non-blocking
  const [liveResult, monthResult] = await Promise.allSettled([
    fetch('/data/reconciliation.json').then(r => r.ok ? r.json() : null),
    fetch('/data/distributions_monthly_recon.json').then(r => r.ok ? r.json() : null),
  ]);

  const liveData  = liveResult.status  === 'fulfilled' ? liveResult.value  : null;
  const monthData = monthResult.status === 'fulfilled' ? monthResult.value : null;

  window.__NZF_META = liveData?.meta || monthData?.meta || {};

  // Last updated label
  const lu = liveData?.meta?.last_updated || monthData?.meta?.last_updated;
  if (lu) {
    document.getElementById('sync-label').innerHTML = `
      <div style="font-family:'Cambay';font-size:.68rem;font-weight:700;text-transform:uppercase;
                  letter-spacing:.06em;color:var(--text-muted)">Data as of</div>
      <div style="font-family:'Bree Serif';font-size:.9rem;color:var(--text-primary)">
        ${new Date(lu).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
      </div>`;
  }

  // Build distribution type list from both data sources
  const types = new Set(['All']);
  (liveData?.rows || []).forEach(r => r.distribution_type && types.add(r.distribution_type));
  Object.values(monthData?.by_month || {}).forEach(mb => {
    Object.keys(mb.crm_dists?.by_transfer_type || {}).forEach(() => {});
    // also from unmatched rows
    Object.values(mb.crm_dists?.by_transfer_type || {}).forEach(tt => {
      (tt.unmatched_rows || []).forEach(r => r.distribution_type && types.add(r.distribution_type));
    });
  });

  buildPickers([...types].sort((a,b) => a==='All'?-1:b==='All'?1:a.localeCompare(b)));

  // Store and initialise
  _monthData = monthData;



  if (monthData) initMonthSection();
  else           document.getElementById('month-panel-inner').innerHTML =
    '<div style="padding:30px;text-align:center;font-family:Cambay;color:var(--text-muted)">distributions_monthly_recon.json not yet available — run the data refresh workflow.</div>';
})();

// ── Pickers ───────────────────────────────────────────────────────
function buildPickers(types) {
  const tEl = document.getElementById('type-picker');
  types.forEach(t => {
    const b = document.createElement('button');
    b.textContent = t;
    b.dataset.type = t;
    if (t === 'All') b.classList.add('active');
    b.onclick = () => {
      tEl.querySelectorAll('button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      _selType = t;
      refreshAll();
    };
    tEl.appendChild(b);
  });
}

function refreshAll() {
  renderMonthTabs();
  renderMonthPanel();
}

// ── YTD ───────────────────────────────────────────────────────────
function filterRowsByType(rows) {
  if (_selType === 'All') return rows;
  return rows.filter(r => r.distribution_type === _selType);
}

// ── Month tabs ────────────────────────────────────────────────────
function renderMonthTabs() {
  if (!_monthData) return;
  const months = (_monthData.meta.months || []).slice().sort();
  if (!months.length) return;
  if (!_selMonth || !months.includes(_selMonth)) _selMonth = months[months.length-1];

  document.getElementById('month-tabs').innerHTML = months.map(m => {
    const active = m === _selMonth ? ' active' : '';
    return `<button class="month-tab${active}" onclick="selectMonth('${m}')">${monthLabel(m)}</button>`;
  }).join('');
}

function selectMonth(m) {
  _selMonth = m;
  document.querySelectorAll('.month-tab').forEach(b => b.classList.toggle('active', b.textContent === monthLabel(m)));
  renderMonthPanel();
}

// ── Month panel ───────────────────────────────────────────────────
function renderMonthPanel() {
  if (!_monthData || !_selMonth) return;
  const inner = document.getElementById('month-panel-inner');
  try { _renderMonthPanelInner(); } catch(e) {
    console.error('renderMonthPanel:', e);
    if (inner) inner.innerHTML = '<div style="padding:24px;text-align:center;font-family:Cambay;color:var(--color-primary)">Error: ' + e.message + '</div>';
  }
}
function _renderMonthPanelInner() {
  const mb   = _monthData.by_month[_selMonth];
  const inner = document.getElementById('month-panel-inner');
  if (!mb) { inner.innerHTML = '<div style="padding:24px;text-align:center;font-family:Cambay;color:var(--text-muted)">No data for this month</div>'; return; }

  // ── Transfer type table ─────────────────────────────────────────
  const ttypes = Object.entries(mb.crm_dists.by_transfer_type)
    .sort((a,b) => b[1].aud - a[1].aud);

  const TRANSFER_NOTES = {
    'Credit Card':   'Paid by distribution team — excluded from unmatched',
    'Cash':          'Paid by distribution team — excluded from unmatched',
    'Not specified': 'Transfer type not set in CRM',
  };

  const ttRows = ttypes.map(([type,v]) => {
    const unmBadge = v.unmatched_count > 0
      ? `<span style="background:rgba(238,53,38,.08);color:#c0392b;border:1px solid rgba(238,53,38,.25);
          padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700">
          ${v.unmatched_count} · ${fmtAUD(v.unmatched_aud)}</span>`
      : `<span style="color:var(--text-muted);font-size:.78rem">—</span>`;
    const matchBadge = v.matched_count > 0
      ? `<span style="background:rgba(73,169,66,.08);color:#2d7a27;border:1px solid rgba(73,169,66,.25);
          padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700">
          ${v.matched_count} · ${fmtAUD(v.matched_aud)}</span>`
      : `<span style="color:var(--text-muted);font-size:.78rem">—</span>`;

    return `<tr>
      <td style="font-weight:700;font-size:.82rem">${type}</td>
      <td style="text-align:right;font-family:'Courier New',monospace;font-size:.82rem">${v.count}</td>
      <td style="text-align:right;font-family:'Courier New',monospace;font-size:.82rem">${fmtAUD(v.aud)}</td>
      <td style="text-align:right">${matchBadge}</td>
      <td style="text-align:right">${unmBadge}</td>
      <td style="font-size:.74rem;color:var(--text-muted);font-style:italic">${TRANSFER_NOTES[type]||''}</td>
    </tr>`;
  }).join('');

  // ── Individual Distributions table ───────────────────────────────
  // Always sourced from distributions_monthly_recon.json unmatched_rows.
  // This guarantees both tables use the same data source and same month bucketing
  // (effective_date: paid_date → created_time). Using reconciliation.json here
  // caused missing rows because it only covers distributions CREATED in the last
  // 30 days, while the Transfer Type table covers all of the month by paid_date.
  const crmBase = window.__NZF_META?.crm_base_url || '';
  let unifiedRows = [];

  ttypes.forEach(([type, v]) => {
    if (['credit card', 'cash'].includes(type.toLowerCase())) return;
    (v.unmatched_rows || []).forEach(r => unifiedRows.push({
      ...r,
      _status:           r.xero_bill_exists ? 'pending' : 'nobill',
      xero_payment_date: '',
      xero_bill_num:     r.xero_bill_exists ? '(bill exists)' : '',
      crm_status:        r.crm_status || '',
    }));
  });

  if (_selType !== 'All') unifiedRows = unifiedRows.filter(r => r.distribution_type === _selType);
  // Sort: no-bill first (highest concern), then pending, then by date desc
  unifiedRows.sort((a, b) => {
    const order = { nobill: 0, overdue: 1, urgent: 2, pending: 3 };
    const sa = order[a._status] ?? 99, sb = order[b._status] ?? 99;
    if (sa !== sb) return sa - sb;
    return new Date(b.approved_date || b.created_time || 0)
         - new Date(a.approved_date || a.created_time || 0);
  });

  // Rows rendered by TableFilter via _renderUnifiedRow
  // Render rows inline — always visible, TableFilter adds column filters on top
  const unmRows = unifiedRows.length === 0
    ? '<tr><td colspan="10" style="padding:24px;text-align:center;font-family:\'Cambay\';color:#2d7a27">&#10003; No unmatched distributions this month</td></tr>'
    : unifiedRows.map(_renderUnifiedRow).join('');

  // ── Xero-only table ─────────────────────────────────────────────
  const CAT_STYLE = {
    'Other (NZF-xxx)':    'background:rgba(123,63,160,.08);color:#7B3FA0;border:1px solid rgba(123,63,160,.25)',
    'Unmatched D-series': 'background:rgba(238,53,38,.08);color:#c0392b;border:1px solid rgba(238,53,38,.25)',
    'Non-case related':   'background:rgba(159,147,147,.1);color:#4C6060;border:1px solid rgba(159,147,147,.3)',
  };
  const cats    = Object.entries(mb.xero_only?.by_category||{}).sort((a,b)=>b[1].aud-a[1].aud);
  const xeroRows = cats.length === 0
    ? '<tr><td colspan="4" style="padding:20px;text-align:center;font-family:Cambay;color:var(--text-muted)">No Xero-only bills this month</td></tr>'
    : cats.map(([cat,v]) => {
        const sty = CAT_STYLE[cat] || 'background:rgba(0,0,0,.04);color:var(--text-secondary)';
        const ex  = (v.bills||[]).slice(0,5).map(b=>`<span style="font-family:'Courier New',monospace;font-size:.72rem;background:var(--surface-2);padding:1px 5px;border-radius:4px;margin-right:3px">${b.bill_number||'—'}</span>`).join('');
        return `<tr>
          <td><span style="${sty};padding:2px 10px;border-radius:10px;font-size:.7rem;font-weight:700">${cat}</span></td>
          <td style="text-align:right;font-family:'Courier New',monospace;font-size:.82rem">${v.count}</td>
          <td style="text-align:right;font-family:'Courier New',monospace;font-size:.82rem">${fmtAUD(v.aud)}</td>
          <td style="font-size:.78rem">${ex}${v.count>5?`<span style="color:var(--text-muted)">+${v.count-5} more</span>`:''}</td>
        </tr>`;
      }).join('');

  inner.innerHTML = `
    <!-- Transfer type breakdown -->
    <div>
      <div style="font-family:'Cambay';font-size:.68rem;font-weight:700;text-transform:uppercase;
                  letter-spacing:.07em;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:8px">
        CRM Distributions by Transfer Type — ${monthFull(_selMonth)}
        ${_selType !== 'All' ? '<span style="background:rgba(31,56,100,.08);color:#1F3864;border:1px solid rgba(31,56,100,.2);padding:1px 8px;border-radius:10px;font-size:.68rem;font-weight:700;text-transform:none;letter-spacing:0">'+_selType+' only</span>' : ''}
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Transfer Type</th>
            <th style="text-align:right">Count</th>
            <th style="text-align:right">Total AUD</th>
            <th style="text-align:right">Matched in Xero</th>
            <th style="text-align:right">No Xero payment</th>
            <th>Note</th>
          </tr></thead>
          <tbody>${ttRows}</tbody>
        </table>
      </div>
    </div>

    <!-- Unified distributions table -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <div style="font-family:'Cambay';font-size:.68rem;font-weight:700;text-transform:uppercase;
                    letter-spacing:.07em;color:var(--text-muted)">
          Individual Distributions
          <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.72rem;color:var(--text-muted)"> — Credit Card &amp; Cash excluded</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${unifiedRows.filter(r=>r._status==='overdue').length > 0
            ? `<span style="background:rgba(238,53,38,.08);color:#c0392b;border:1px solid rgba(238,53,38,.25);
                padding:2px 10px;border-radius:10px;font-family:'Cambay';font-size:.7rem;font-weight:700">
                &#9888; ${unifiedRows.filter(r=>r._status==='overdue').length} overdue</span>` : ''}
          <span id="unified-count" style="font-family:'Cambay';font-size:.72rem;color:var(--text-muted)">${unifiedRows.length} distributions</span>
          <button class="tf-clear-btn" id="unified-clear-btn" onclick="_unifiedTF&&_unifiedTF.clearAll()">&#10005; Clear filters</button>
        </div>
      </div>
      <div style="overflow-x:auto" id="unified-table-wrap">
        <table id="unified-dist-table">
          <thead>
            <tr>
              <th>Dist. ID</th>
              <th>Type</th>
              <th>Subject / Payee</th>
              <th style="text-align:right">Amount</th>
              <th>Transfer</th>
              <th>Date</th>
              <th style="text-align:center">Age</th>
              <th>Xero payment</th>
              <th>CRM status</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="unified-dist-tbody">${unmRows}</tbody>
        </table>
      </div>
    </div>

    <!-- Xero only -->
    <div>
      <div style="font-family:'Cambay';font-size:.68rem;font-weight:700;text-transform:uppercase;
                  letter-spacing:.07em;color:var(--text-muted);margin-bottom:8px">
        Xero Bills with No Matching CRM Distribution
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Category</th>
            <th style="text-align:right">Count</th>
            <th style="text-align:right">Total AUD</th>
            <th>Examples</th>
          </tr></thead>
          <tbody>${xeroRows}</tbody>
        </table>
      </div>
    </div>`;

  window._unifiedRows = unifiedRows;
  initUnifiedFilter();
}  // end _renderMonthPanelInner

// ── Live section ──────────────────────────────────────────────────
const STATUS_CFG = {
  paid:    { label:'Paid in Xero',   cls:'s-paid'    },
  overdue: { label:'Overdue >72h',   cls:'s-overdue' },
  urgent:  { label:'Due soon',       cls:'s-urgent'  },
  pending: { label:'Pending',        cls:'s-pending' },
  nobill:  { label:'No Xero bill',   cls:'s-nobill'  },
};
const STATUS_ORDER = { overdue:0, nobill:1, urgent:2, pending:3, paid:4 };


function initMonthSection() {
  renderMonthTabs();
  renderMonthPanel();
}
// ── Unified distribution table: TableFilter init ──────────────────
let _unifiedTF = null;

function initUnifiedFilter() {
  const tbl = document.getElementById('unified-dist-table');
  if (!tbl) return;
  if (!window._unifiedRows) window._unifiedRows = [];

  // Remove any existing filter row so TableFilter can rebuild cleanly
  tbl.querySelector('tr.tf-filter-row')?.remove();
  _unifiedTF = null;

  _unifiedTF = new TableFilter({
    tableEl:   tbl,
    tbodyId:   'unified-dist-tbody',
    colspan:   10,
    clearBtnId:'unified-clear-btn',
    getRows:   () => window._unifiedRows || [],
    renderRow: _renderUnifiedRow,
    onUpdate:  (shown, total) => {
      const el = document.getElementById('unified-count');
      if (el) el.textContent = shown < total
        ? shown + ' of ' + total + ' distributions'
        : total + ' distributions';
    },
    columns: [
      { key:'dist_id',           type:'text',   label:'Dist. ID'      },
      { key:'distribution_type', type:'select', label:'Type'          },
      { key:'xero_payee',        type:'text',   label:'Subject/Payee' },
      { key:'amount',            type:'amount', label:'Amount'        },
      { key:'transfer_type',     type:'select', label:'Transfer'      },
      { key:'approved_date',     type:'date',   label:'Date'          },
      { key:'_hours',            type:'hours',  label:'Age'           },
      { key:'xero_payment_date', type:'date',   label:'Xero date'     },
      { key:'crm_status',        type:'select', label:'CRM status'    },
      { key:'_status',           type:'select', label:'Status',
        values:['overdue','nobill','urgent','pending','paid'],
        valueLabels:{overdue:'Overdue >72h', nobill:'No Xero bill',
                     urgent:'Due soon', pending:'Pending', paid:'Paid in Xero'} },
    ],
  });
  _unifiedTF.build();
  _unifiedTF.refresh();
}

function _renderUnifiedRow(r) {
  const crmBase = window.__NZF_META?.crm_base_url || '';
  const STATUS_CFG = {
    paid:    { label:'Paid in Xero',   cls:'s-paid'    },
    overdue: { label:'Overdue >72h',   cls:'s-overdue' },
    urgent:  { label:'Due soon',       cls:'s-urgent'  },
    pending: { label:'Pending',        cls:'s-pending' },
    nobill:  { label:'No Xero bill',   cls:'s-nobill'  },
  };
  const cfg  = STATUS_CFG[r._status] || STATUS_CFG.pending;
  const hrs  = r._hours;
  const hc   = hrs === null ? 'h-na' : hrs > 72 ? 'h-danger' : hrs > 48 ? 'h-warn' : 'h-ok';
  const hTxt = hrs === null ? '—' : hrs >= 48 ? (hrs/24).toFixed(1)+'d' : hrs+'h';
  const payee = r.xero_payee || r.crm_payee || r.subject || '—';
  const date  = r.approved_date || r.created_time || '';
  const dated = r.approved_date ? 'approved' : 'created';
  const xeroHtml = r.xero_payment_date
    ? '<span class="xero-paid">&#10003; ' + fmtDate(r.xero_payment_date) + '</span>'
    : r.xero_bill_num
      ? '<span class="xero-pending">Bill raised</span>'
      : '<span class="xero-missing">No bill</span>';
  const link = (crmBase && r.record_id)
    ? '<a href="' + crmBase + '/PurchaseOrders/' + r.record_id + '" target="_blank" rel="noopener" style="font-family:monospace;font-size:.8rem;font-weight:700;color:var(--color-primary);text-decoration:none">' + r.dist_id + ' &#8599;</a>'
    : '<span style="font-family:monospace;font-size:.8rem;font-weight:700;color:var(--color-primary)">' + r.dist_id + '</span>';
  const rowCls = r._status === 'overdue' ? ' class="row-overdue"' : '';
  return '<tr' + rowCls + '>'
    + '<td style="white-space:nowrap">' + link + '</td>'
    + '<td style="font-size:.75rem;color:var(--text-muted)">' + (r.distribution_type||'—') + '</td>'
    + '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.82rem" title="' + payee + '">' + payee + '</td>'
    + '<td style="text-align:right;font-family:monospace;font-size:.82rem;font-weight:700">' + fmtAUD(r.amount) + '</td>'
    + '<td style="font-size:.76rem;color:var(--text-secondary)">' + (r.transfer_type||'—') + '</td>'
    + '<td style="font-size:.78rem;white-space:nowrap">' + fmtDate(date) + '<br><span style="font-size:.68rem;color:var(--text-muted)">' + dated + '</span></td>'
    + '<td style="text-align:center"><span class="' + hc + '">' + hTxt + '</span></td>'
    + '<td>' + xeroHtml + '</td>'
    + '<td style="font-size:.76rem;color:var(--text-secondary)">' + (r.crm_status||'—') + '</td>'
    + '<td><span class="badge ' + cfg.cls + '" style="padding:2px 8px;border-radius:10px;font-family:var(--font-body,Cambay);font-size:.68rem;font-weight:700;white-space:nowrap">' + cfg.label + '</span></td>'
    + '</tr>';
}

</script>
